<div class="join flex justify-center items-center my-5">
  @for (page of getPagesList(); track page) {
  <button class="join-item btn" [class.btn-primary]="page == activePage() && isAdminSection()"
    [class.btn-secondary]="page == activePage() && !isAdminSection()" [routerLink]="[]"
    [queryParams]="{page:page}" (click)="activePage.set(page)">{{page}}</button>
  }
  <!--   @empty {
    <p>No hay páginas</p>
  } -->

</div>
