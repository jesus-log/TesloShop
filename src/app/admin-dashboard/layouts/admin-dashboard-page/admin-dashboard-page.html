<div class="bg-slate-800 min-h-screen antialiased text-slate-300 selection:bg-blue-600 selection:text-white">
    <div class="drawer lg:drawer-open">
        <input #adminDrawerToggle id="admin-drawer" type="checkbox" class="drawer-toggle" />

        <div class="drawer-content flex flex-col min-h-screen">
            <div class="navbar bg-gray-900 text-slate-300 lg:hidden sticky top-0 z-40">
                <div class="flex-none">
                    <label for="admin-drawer" aria-label="open sidebar" class="btn btn-ghost drawer-button">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 5.25h16.5m-16.5 6h16.5m-16.5 6h16.5" />
                        </svg>
                    </label>
                </div>
                <div class="flex-1 px-2">
                    <h1 routerLink="/" class="text-lg font-bold text-white font-[monserrat] cursor-pointer">Teslo<span class="text-blue-500">|Shop</span></h1>
                </div>
            </div>

            <main class="flex-1 pt-5 px-5 lg:pt-6 lg:px-6">
                <router-outlet></router-outlet>
            </main>
        </div>

        <div class="drawer-side z-50">
            <label for="admin-drawer" aria-label="close sidebar" class="drawer-overlay"></label>

            <aside id="menu" class="bg-gray-900 min-h-full text-slate-300 w-72 max-w-[85vw] overflow-y-auto">
                <div id="logo" class="my-4 px-6">
                    <h1 class="lg:hidden text-lg font-bold text-white font-[monserrat]">Teslo<span class="text-blue-500">|Shop</span></h1>
                    <a routerLink="/" class="hidden lg:block text-2xl font-bold text-white font-[monserrat] cursor-pointer hover:opacity-80 transition">Teslo<span class="text-blue-500">|Shop</span></a>
                    <p class="text-slate-500 text-sm">Manage your actions and activities</p>
                </div>

                <div id="profile" class="px-6 py-10">
                    <p class="text-slate-500 mb-3">Bienvenido,</p>
                    <div class="inline-flex space-x-2 items-center">
                        <span>
                            <img class="rounded-full w-8 h-8" src="https://images.unsplash.com/photo-1542909168-82c3e7fdca5c?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=128&q=80" alt="">
                        </span>
                        <span class="text-sm md:text-base font-bold">
                            {{user()?.fullName}}
                        </span>
                    </div>
                </div>

                <div id="nav" class="w-full px-6">
                    <a routerLink="/admin/products" routerLinkActive="bg-blue-800" (click)="closeDrawer()" class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-white/5 transition ease-linear duration-150">
                        <div>
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125" />
                            </svg>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-lg text-slate-300 font-bold leading-5">Productos</span>
                            <span class="text-sm text-slate-500 hidden md:block">Listado de productos</span>
                        </div>
                    </a>

                    <div class="divider my-2"></div>
                    <button (click)="logout()" class="btn btn-ghost text-primary w-full">Cerrar sesión</button>
                </div>
            </aside>
        </div>
    </div>
</div>
