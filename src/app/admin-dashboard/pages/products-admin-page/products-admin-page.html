<h1 class="text-2xl font-bold">Listado de productos</h1>
<h3 class="text-lg">Total de productos
  <span class="text-primary">{{productsResource.value()?.count}}</span>
</h3>

<div class="divider"></div>

<div class="flex flex-col lg:flex-row gap-2 lg:gap-4 items-start lg:items-center py-4">
  <app-pagination [pages]="productsResource.value()?.pages ?? 0" [currentPage]="paginationService.currentPage()"></app-pagination>
  <p class="mt-2 mb-1 md:ml-5">
    Productos por página
  </p>
  <select (change)="onChangeSelect($event)" class="select select-bordered w-full lg:w-32">
    <option value="10" selected>10</option>
    <option value="20">20</option>
    <option value="50">50</option>
    <option value="100">100</option>
  </select>
  <div class="flex flex-1"></div>
  <button class="btn btn-primary w-full lg:w-auto" routerLink="/admin/products/new">Nuevo producto</button>
</div>
<div class="mb-5">
  <products-table [products]="productsResource.value()?.products ?? []"></products-table>
</div>
