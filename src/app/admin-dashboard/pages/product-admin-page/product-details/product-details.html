<h1 class="text-2xl font-bold">{{ product().title }}</h1>
<div class="divider"></div>

<form [formGroup]="productForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4" (ngSubmit)="onSubmit()">
  <!-- Datos generales -->
  <div class="flex flex-col gap-2">
    <h2 class="text-2xl font-bold h-12">Datos generales</h2>
    <input formControlName="title" type="text" placeholder="Título" class="input input-bordered w-full"
      [class.border-red-500]="productForm.get('title')?.errors ?? false" />
    <form-error-label [control]="productForm.get('title')!"></form-error-label>

    <input formControlName="slug" type="text" placeholder="Slug" class="input input-bordered w-full"
      [class.border-red-500]="productForm.get('slug')?.errors ?? false" />
    <form-error-label [control]="productForm.get('slug')!"></form-error-label>


    <textarea formControlName="description" class="textarea textarea-bordered" placeholder="Descripción" rows="6"
      [class.border-red-500]="productForm.get('description')?.errors ?? false"></textarea>
    <form-error-label [control]="productForm.get('description')!"></form-error-label>


    <h2 class="text-lg font-bold">Datos de venta</h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
      <div>
        <input formControlName="price" type="number" placeholder="Precio" class="input input-bordered w-full"
          [class.border-red-500]="productForm.get('price')?.errors ?? false" />
        <form-error-label [control]="productForm.get('price')!"></form-error-label>
      </div>


      <div>
        <input formControlName="stock" type="number" placeholder="Inventario" class="input input-bordered w-full"
          [class.border-red-500]="productForm.get('stock')?.errors ?? false" />
        <form-error-label [control]="productForm.get('stock')!"></form-error-label>
      </div>

    </div>



    <!-- tags -->
    <input formControlName="tags" type="text" placeholder="Tags" class="input input-bordered w-full"
      [class.border-red-500]="productForm.get('tags')?.errors ?? false" />
    <form-error-label [control]="productForm.get('tags')!"></form-error-label>


    <!-- Botones para el género -->
    <div class="grid grid-cols-4 gap-2">
      <!-- <button class="btn btn-sm btn-outline">Masculino</button> -->
      <button class="btn btn-sm  btn-primary" [class.btn-outline]="productForm.value.gender != 'men'"
        (click)="productForm.patchValue({gender:'men'})" type="button">Masculino</button>
      <button class="btn btn-sm btn-secondary" [class.btn-outline]="productForm.value.gender != 'women'"
        (click)="productForm.patchValue({gender:'women'})" type="button">Femenino</button>
      <button class="btn btn-sm btn-warning" [class.btn-outline]="productForm.value.gender != 'kid'"
        (click)="productForm.patchValue({gender:'kid'})" type="button">Kid</button>
      <button class="btn btn-sm btn-accent" [class.btn-outline]="productForm.value.gender != 'unisex'"
        (click)="productForm.patchValue({gender:'unisex'})" type="button">Unisex</button>
    </div>

    <!-- <select class="select select-bordered w-full">
      <option value="male">Masculino</option>
      <option value="female">Femenino</option>
      <option value="unisex">Unisex</option>
    </select> -->

    <!-- Sizes -->
    <div class="grid grid-cols-6 gap-2">
      @for (size of sizes; track size) {
      <button class="btn btn-sm" [class.btn-secondary]="productForm.value.sizes?.includes(size)" type="button"
        (click)="onSizeClicked(size)">{{ size }}</button>
      }
    </div>
  </div>

  <!-- Imágenes -->
  <div class="flex flex-col gap-2">
    <div class="flex justify-end h-12">
      <button class="btn btn-secondary" type="submit">
        <!-- <span class="loading loading-spinner loading-sm"></span> -->

        Guardar
      </button>
    </div>

    <product-carrusel [images]="product().images" />

    <input type="file" class="file-input file-input-bordered w-full mt-4" />
  </div>
</form>
@if(wasSaved()){
<div class="alert alert-success fixed right-4 bottom-4 w-80 animate-fadeIn">
  <span>Datos actualizados correctamente</span>
</div>
}
